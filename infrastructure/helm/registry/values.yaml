deploymentName: registry
appName: registry
namespace: registry

containers:
  registry:
    image: registry:2
    imagePullPolicy: IfNotPresent
    monthPath: /var/lib/registry
    
nodeAffinity:
  hostname:
    values:
      - master-00

networkPolicy:
  allowedCidrs:
    - "10.0.0.0/8"

volumes:
  storageClassName: manual
  capacity: 15Gi
  hostPath: "/data/registry"
  pv:
    name: pv-volume-registry
    accessModes:
      - ReadWriteOnce
  pvc:
    name: pvc-registry
    storageClassName: manual
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000
  externalIPs:
    - 10.0.0.100 #FIXME: should not be hardcoded

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi