---
- name: Configure kernel parameters for K3s security
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: 'vm.overcommit_memory', value: '1' }
    - { name: 'kernel.panic', value: '10' }
    - { name: 'kernel.panic_on_oops', value: '1' }



- name: Download K3s installation script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'

- name: Create K3s audit policy BEFORE installation
  copy:
    dest: /etc/k3s-audit-policy.yaml
    mode: '644'
    content: |
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
      - level: Metadata
        namespaces: ["kube-system", "kube-public", "kube-node-lease"]
      - level: Request
        resources:
        - group: ""
          resources: ["secrets", "configmaps"]
      - level: Metadata
        omitStages:
        - RequestReceived
- name: Force system to use xtables-nft backend
  become: true
  shell: |
    update-alternatives --set iptables /usr/sbin/iptables-nft
    update-alternatives --set ip6tables /usr/sbin/ip6tables-nft
    update-alternatives --set arptables /usr/sbin/arptables-nft
    update-alternatives --set ebtables /usr/sbin/ebtables-nft
  args:
    executable: /bin/bash
- name: Install K3s server with secure configuration
  shell: |
    K3S_NODE_NAME="{{ inventory_hostname }}" \
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    K3S_TOKEN="{{ hostvars[groups['master'][0]].k3s_token }}" \
    K3S_URL="https://{{ hostvars[groups['master'][0]].wireguard_ip }}:6443" \
    K3S_KUBECONFIG_MODE="600" \
    INSTALL_K3S_EXEC="server" \
    /tmp/k3s-install.sh  \
    --advertise-address="{{ master_nodes[inventory_hostname].wireguard_ip }}" \
    --bind-address="{{  master_nodes[inventory_hostname].wireguard_ip }}" \
    --flannel-iface={{ master_nodes[inventory_hostname].wireguard_interface }} \
    --docker \
    --kube-proxy-arg=proxy-mode=nftables \
    --tls-san="{{ ansible_host }}" \
    --tls-san="{{ master_nodes[inventory_hostname].wireguard_ip  }}" \
    --tls-san="{{ inventory_hostname }}" \
    --tls-san="localhost" \
    --tls-san="127.0.0.1" \
    --node-ip="{{ wireguard_ip }}" \
    --cluster-cidr="10.42.0.0/16" \
    --service-cidr="10.43.0.0/16" \
    --write-kubeconfig-mode="600" \
    --protect-kernel-defaults \
    --secrets-encryption \
    --kube-apiserver-arg="audit-log-path=/var/log/k3s-audit.log" \
    --kube-apiserver-arg="audit-policy-file=/etc/k3s-audit-policy.yaml" \
    --kube-apiserver-arg="enable-admission-plugins=NodeRestriction" \
    --kubelet-arg="protect-kernel-defaults=true" \
    --disable="traefik" 
  register: k3s_install_result



- name: Check if K3s service started successfully
  systemd:
    name: k3s
    state: started
  register: k3s_service_result
  failed_when: false

- name: Get K3s service status if it failed
  command: systemctl status k3s.service
  register: k3s_status_debug
  when: k3s_service_result.failed | default(false)

- name: Get K3s logs if service failed
  command: journalctl -u k3s.service --no-pager -n 30
  register: k3s_logs_debug
  when: k3s_service_result.failed | default(false)

- name: Display debug info if service failed
  debug:
    msg:
      - "K3s service failed to start!"
      - "Service status:"
      - "{{ k3s_status_debug.stdout_lines | default([]) }}"
      - "Recent logs:"
      - "{{ k3s_logs_debug.stdout_lines | default([]) }}"
  when: k3s_service_result.failed | default(false)

- name: Fail if K3s service didn't start
  fail:
    msg: "K3s service failed to start. Check debug output above."
  when: k3s_service_result.failed | default(false)

- name: Wait for K3s API server to be ready
  wait_for:
    port: 6443
    host: "{{ wireguard_ip }}"
    delay: 10
    timeout: 120

- name: Set proper permissions on kubeconfig
  file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '600'
    owner: root
    group: root

- name: Remove installation script
  file:
    path: /tmp/k3s-install.sh
    state: absent