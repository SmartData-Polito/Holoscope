---
- name: Update apt cache and install dependencies
  ansible.builtin.apt:
    update_cache: yes
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Remove existing Docker installations
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Set Docker repository variables
  ansible.builtin.set_fact:
    docker_os_name: "{{ ansible_distribution | lower }}"
    docker_os_release: "{{ ansible_distribution_release }}"
    docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Remove old Docker repository files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ docker_os_name }}/gpg"
    dest: /tmp/docker.gpg
    mode: '0644'

- name: Convert and install Docker GPG key
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/docker.gpg > /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Remove temporary GPG key file
  ansible.builtin.file:
    path: /tmp/docker.gpg
    state: absent

- name: Add Docker repository with signed-by
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ docker_os_name }} {{ docker_os_release }} stable"
    state: present
    filename: docker
    update_cache: yes

- name: Install Docker and other required packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - python3-kubernetes
      - python3-yaml
      - python3-jsonpatch
    state: present
    update_cache: yes

- name: Create Docker daemon configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker daemon options
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "insecure-registries" : ["{{ local_registry }}"],
        "firewall-backend": "nftables"
      
      }
    mode: '0644'
  notify: restart docker

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
    
- name: Download Helm command line tool
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0700'

- name: Install Helm
  ansible.builtin.command:
    cmd: /tmp/get_helm.sh
    creates: /usr/local/bin/helm
  environment:
    DESIRED_VERSION: "{{ helm_version | default('') }}"

- name: Remove Helm installer script
  ansible.builtin.file:
    path: /tmp/get_helm.sh
    state: absent