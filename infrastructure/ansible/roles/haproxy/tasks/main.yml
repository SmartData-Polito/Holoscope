---

- name: Install HAProxy and Keepalived
  apt:
    name:
      - haproxy
      - keepalived
    state: present

- name: Deploy haproxy.cfg
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: 0644
  vars:
    master: "{{  hostvars[groups['master'][0]].master_nodes }}"
  notify: restart haproxy

- name: Ensure haproxy is enabled and running
  service:
    name: haproxy
    enabled: yes
    state: started
