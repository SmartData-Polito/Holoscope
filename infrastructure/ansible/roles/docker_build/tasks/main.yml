---
# roles/docker_build/tasks/main.yml
- name: Validate required variables
  assert:
    that:
      - application is defined
      - local_registry is defined
    fail_msg: "Missing required variables: application or local_registry"

- name: Use pre-loaded application configuration
  set_fact:
    app_config: "{{ vars['app_vars_' + application] }}"
  when: vars['app_vars_' + application] is defined

- name: Fail if application config not found
  fail:
    msg: "No configuration found for application '{{ application }}'. Check that group_vars/{{ application }}.yml exists."
  when: app_config is not defined

- name: Get Docker images for this application
  set_fact:
    docker_images: "{{ app_config.docker_images | default([]) }}"

- name: Debug collected Docker images
  debug:
    var: docker_images

- name: Debug build context
  debug:
    msg:
      - "Application: {{ application }}"
      - "Local registry: {{ local_registry }}"
      - "Images to build: {{ docker_images | length }}"

- name: Verify Docker build contexts exist
  stat:
    path: "/tmp/{{ item.path }}"
  register: context_check
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: not context_check.stat.exists
  when: docker_images | length > 0

- name: Verify Dockerfiles exist
  stat:
    path: "/tmp/{{ item.path }}/{{ item.dockerfile }}"
  register: dockerfile_check
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: not dockerfile_check.stat.exists
  when: docker_images | length > 0

- name: Create build directories
  file:
    path: "/tmp/docker-build/{{ item.name }}"
    state: directory
    mode: '0755'
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: docker_images | length > 0

- name: Copy Docker context for building
  copy:
    src: "/tmp/{{ item.path }}/"
    dest: "/tmp/docker-build/{{ item.name }}/"
    remote_src: true
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: docker_images | length > 0

- name: Install pip and required Python libraries
  apt:
    name:
      - python3-pip
      - python3-requests
      - python3-docker
    state: present
    update_cache: yes
  become: true

- name: Add current user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  become: true

- name: Reset ssh connection to allow user changes to affect ansible user
  meta: reset_connection

- name: Build Docker images
  command: |
    docker build -t {{ item.author }}/{{ item.name }}:{{ item.tag }} 
    -f /tmp/docker-build/{{ item.name }}/{{ item.dockerfile }} 
    /tmp/docker-build/{{ item.name }}
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: docker_images | length > 0
  register: build_result

- name: Tag images for local registry
  command: |
    docker tag {{ item.author }}/{{ item.name }}:{{ item.tag }} 
    {{ local_registry }}/{{ item.author }}/{{ item.name }}:{{ item.tag }}
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: docker_images | length > 0

- name: Push images to local registry
  command: |
    docker push {{ local_registry }}/{{ item.author }}/{{ item.name }}:{{ item.tag }}
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: docker_images | length > 0
  register: push_result

- name: Cleanup build directories
  file:
    path: "/tmp/docker-build/{{ item.name }}"
    state: absent
  loop: "{{ docker_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: docker_images | length > 0

- name: Display build results
  debug:
    msg: "Successfully built and pushed {{ docker_images | length }} images for {{ application }}"
  when: docker_images | length > 0