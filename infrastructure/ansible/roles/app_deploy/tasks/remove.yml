---
- name: Check if release exists
  kubernetes.core.helm_info:
    name: "{{ app_name }}"
    namespace: "{{ app_namespace }}"
  register: release_info
  failed_when: false

- name: Skip removal if release doesn't exist
  debug:
    msg: "Release {{ app_name }} not found in namespace {{ app_namespace }}, skipping removal"
  when: release_info.status is undefined

- name: Remove Helm chart for {{ app_name }}
  kubernetes.core.helm:
    name: "{{ app_name }}"
    namespace: "{{ app_namespace }}"
    state: absent
    wait: true
    wait_timeout: "{{ app_config.timeout | default(300) }}"
  register: helm_remove_result
  when: release_info.status is defined

- name: Display removal result
  debug:
    msg:
      - "Successfully removed {{ app_name }}"
      - "Namespace: {{ app_namespace }}"
  when:
    - helm_remove_result is defined
    - helm_remove_result is succeeded

- name: Handle removal failure
  debug:
    msg:
      - "Failed to remove {{ app_name }}"
      - "Error: {{ helm_remove_result.msg | default('Unknown error') }}"
  when:
    - helm_remove_result is defined
    - helm_remove_result is failed

- name: Optionally remove namespace
  kubernetes.core.k8s:
    name: "{{ app_namespace }}"
    api_version: v1
    kind: Namespace
    state: absent
    wait: true
    wait_timeout: 120
  when:
    - app_config.remove_namespace | default(false) | bool
    - helm_remove_result is succeeded
