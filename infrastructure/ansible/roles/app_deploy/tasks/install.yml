---
- name: Validate chart path exists
  stat:
    path: "{{ chart_path }}"
  register: chart_stat
  delegate_to: localhost

- name: Fail if chart path doesn't exist
  fail:
    msg: "Helm chart not found at: {{ chart_path }}"
  when: not chart_stat.stat.exists

- name: Create namespace if it doesn't exist
  kubernetes.core.k8s:
    name: "{{ app_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
  ignore_errors: true

- name: Deploy Helm chart for {{ app_name }}
  kubernetes.core.helm:
    name: "{{ app_name }}"
    chart_ref: "{{ chart_path }}"
    namespace: "{{ app_namespace }}"
    create_namespace: true
    values: "{{ app_values }}"
    state: present
    wait: true
    wait_timeout: "{{ app_config.timeout | default(300) }}"
  register: helm_deploy_result

- name: Display deployment result
  debug:
    msg:
      - "Successfully deployed {{ app_name }}"
      - "Namespace: {{ app_namespace }}"
      - "Chart: {{ chart_path }}"
  when: helm_deploy_result is succeeded

- name: Handle deployment failure
  debug:
    msg:
      - "Failed to deploy {{ app_name }}"
      - "Error: {{ helm_deploy_result.msg | default('Unknown error') }}"
  when: helm_deploy_result is failed
