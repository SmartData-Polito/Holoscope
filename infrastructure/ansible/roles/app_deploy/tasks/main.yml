---
- name: Use pre-loaded application configuration
  set_fact:
    app_config: "{{ vars['app_vars_' + application] }}"
  when: vars['app_vars_' + application] is defined



- name: Fail if application config not found
  fail:
    msg: "No configuration found for application '{{ application }}'. Check that group_vars/{{ application }}.yml exists."
  when: app_config is not defined

- name: Set application facts
  set_fact:
    app_name: "{{ application }}"
    app_namespace: "{{ app_config.namespace | default(application) }}"
    chart_path: "/tmp/applications/{{ application }}/helm"
    app_enabled: "{{ app_config.enabled | default(true) | bool }}"
    helm_values: "{{ app_config['values'] | default({}) }}"

# Inject the git-SHA image tag into helm values so Kubernetes sees a spec change
- name: Set image tag in helm values
  set_fact:
    helm_values: "{{ helm_values | combine({'image_tag': deploy_image_tag}, recursive=True) }}"
  when: deploy_image_tag is defined

- name: Initialize extra_app_configs
  set_fact:
    extra_app_configs: {}

# Build the dictionary for all apps except toolbox itself
- name: Build extra_app_configs (all apps except toolbox)
  set_fact:
    extra_app_configs: "{{ extra_app_configs | combine({ clean_name: vars[item] }, recursive=True) }}"
  loop: "{{ vars | dict2items | selectattr('key', 'match', '^app_vars_') | map(attribute='key') }}"
  vars:
    clean_name: "{{ item | regex_replace('^app_vars_', '') }}"
  when:
    - application == 'toolbox'
    - item != 'app_vars_' + application

# Inject extra configs only for toolbox
- name: Inject extra app configs if application == toolbox
  set_fact:
    helm_values: "{{ helm_values | combine({'extra_app_configs': extra_app_configs}, recursive=True) }}"
  when: application == 'toolbox'


- name: Ensure namespace exists
  kubernetes.core.k8s:
    name: "{{ app_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
  when: app_enabled


