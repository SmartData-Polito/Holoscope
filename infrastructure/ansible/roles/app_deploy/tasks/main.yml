- name: Install Helm chart for {{ app_name }}
  kubernetes.core.helm:
    name: "{{ app_name }}"
    chart_ref: "{{ chart_path }}"
    namespace: "{{ app_namespace }}"
    create_namespace: false
    state: present
    wait: false
    values: "{{ helm_values }}"
  when:
    - app_enabled
    - (deploy_action | default('install')) == 'install'
  register: helm_result

- name: Upgrade Helm chart for {{ app_name }}
  kubernetes.core.helm:
    name: "{{ app_name }}"
    chart_ref: "{{ chart_path }}"
    namespace: "{{ app_namespace }}"
    create_namespace: false
    state: present
    force: true

    wait: false
    values: "{{ helm_values }}"
  when:
    - app_enabled
    - (deploy_action | default('install')) == 'upgrade'
  register: helm_result


- name: Remove Helm chart for {{ app_name }}
  kubernetes.core.helm:
    name: "{{ app_name }}"
    namespace: "{{ app_namespace }}"
    state: absent
    wait: false
    timeout: "{{ app_config.timeout | default(300) }}"
  when: 
    #- app_enabled
    - (deploy_action | default('install')) == 'remove'
  register: helm_remove_result

- name: Display deployment result
  debug:
    msg: "{{ 'Successfully deployed/upgraded' if helm_result.changed else 'No changes needed for' }} {{ app_name }}"
  when: 
    - app_enabled
    - (deploy_action | default('install')) in ['install', 'upgrade']
    - helm_result is defined