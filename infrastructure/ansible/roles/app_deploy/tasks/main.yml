---
- name: Load application variables
  include_vars:
    file: "{{ inventory_dir }}/group_vars/{{ application }}.yml"
    name: app_config
  failed_when: false
  register: var_load_result

- name: Fail if application config not found
  fail:
    msg: "Configuration file not found for application: {{ application }}"
  when: var_load_result.failed | default(false)

- name: Set application facts
  set_fact:
    app_name: "{{ application }}"
    app_namespace: "{{ app_config.namespace | default(application) }}"
    chart_path: "{{ app_config.chart_path }}"
    app_values: "{{ app_config.values | default({}) }}"
    app_enabled: "{{ app_config.enabled | default(true) | bool }}"

- name: Debug application configuration
  debug:
    msg:
      - "Application: {{ app_name }}"
      - "Namespace: {{ app_namespace }}"
      - "Chart Path: {{ chart_path }}"
      - "Operation: {{ operation }}"
      - "Enabled: {{ app_enabled }}"
  when: debug_mode | default(false) | bool

- name: Skip disabled applications
  debug:
    msg: "Skipping {{ app_name }} - application is disabled"
  when: not app_enabled

- name: Include installation tasks
  include_tasks: install.yml
  when:
    - operation == 'install'
    - app_enabled

- name: Include removal tasks
  include_tasks: remove.yml
  when:
    - operation == 'remove'
    - app_enabled

- name: Include validation tasks
  include_tasks: validate.yml
  when:
    - operation == 'install'
    - app_enabled
    - validate_deployment | default(true) | bool
