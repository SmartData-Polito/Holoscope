- name: Create WireGuard client configuration file
  template:
    src: client_multiplepeer.conf.j2
    dest: /etc/wireguard/{{ wireguard_interface }}.conf
  become: true
  vars:
     master_nodes: "{{ hostvars[groups['master'][0]].master_nodes | dict2items }}"


- name: Activate Wireguard at boot
  command: "{{ item }}"
  loop:
    - systemctl enable wg-quick@{{ wireguard_interface }}.service
    - systemctl daemon-reload      

- name: Reload WireGuard 
  block:
    - command: wg-quick {{ item }} {{ wireguard_interface }} 
      with_items:
        - down
        - up
      failed_when: false

- name: Set WireGuard IP fact for current host
  set_fact:
    wireguard_ip: "{{ wireguard_ip }}"  
  delegate_facts: true
