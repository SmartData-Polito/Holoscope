---
# Dynamic application deployment playbook
- name: Set shared variables
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Default to install if no action specified
    operation: "{{ action | default('install') }}"
    build_images: "{{ build | default(true) | bool }}"
  
  tasks:
    - name: Discover application groups from inventory
      set_fact:
        discovered_applications: "{{ groups | select('match', '^(?!master$|agents$|deployment$|registry$|all$|ungrouped$).*') | list }}"
      
    - name: Filter for applications with hosts
      set_fact:
        active_applications: "{{ discovered_applications | select('in', groups) | select('regex', '.+') | map('regex_replace', '^(.*)$', '\\1') | list }}"
    
    - name: Pre-load all application group vars
      include_vars:
        file: "{{ inventory_dir }}/group_vars/{{ item }}.yml"
        name: "app_vars_{{ item }}"
      loop: "{{ active_applications }}"
      ignore_errors: true
    
    - name: Initialize enabled applications list
      set_fact:
        enabled_applications: []

    - name: Check which applications are enabled
      set_fact:
        enabled_applications: "{{ enabled_applications + [item] }}"
      loop: "{{ active_applications }}"
      when: 
        - hostvars['localhost']['app_vars_' + item] is defined
        - hostvars['localhost']['app_vars_' + item].enabled | default(true) | bool
      
    - name: Set target applications
      set_fact:
        target_applications: "{{ applications | default(enabled_applications) }}"
      
    - name: Set shared facts
      set_fact:
        shared_deploy_action: "{{ operation }}"
        shared_target_applications: "{{ target_applications }}"
        shared_build_images: "{{ build_images }}"
      
    - name: Debug applications
      debug:
        msg:
          - "Applications to deploy: {{ target_applications }}"
          - "Operation: {{ operation }}"

- name: Prepare Kubernetes configuration
  hosts: master[0]
  become: true
  tasks:
    - name: Check if kubeconfig exists
      stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_stat

    - name: Fail if kubeconfig not found
      fail:
        msg: "Kubeconfig file not found at /etc/rancher/k3s/k3s.yaml on master node"
      when: not kubeconfig_stat.stat.exists

    - name: Set kubeconfig environment variable
      set_fact:
        kube_config: "/etc/rancher/k3s/k3s.yaml"
  
    - name: Set kubeconfig content as fact 
      slurp:
        src: "/etc/rancher/k3s/k3s.yaml"
      register: kubeconfig_content
      
    - name: Set master IP for kubectl access
      set_fact:
        master_ip: "{{ hostvars[inventory_hostname].ansible_host }}"

    - name: Pass kubeconfig to localhost
      set_fact:
        shared_kubeconfig_content: "{{ kubeconfig_content.content | b64decode | regex_replace('server: https://127.0.0.1:6443', 'server: https://' + master_ip + ':6443') }}"
        shared_master_ip: "{{ master_ip }}"
      delegate_to: localhost
      delegate_facts: true
      
  tags: [always, k8s]

- name: Build Docker Images
  hosts: registry
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Include Docker build role
      include_role:
        name: docker_build
      when: hostvars.localhost.shared_build_images | default(false) | bool
  tags: [build]

- name: Deploy Applications
  hosts: localhost
  connection: local
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  vars:
    kubeconfig_path: "{{ lookup('env','HOME') }}/.kube/k3s-kubeconfig.yaml"
  tasks:
    - name: Ensure helm is installed
      command: which helm
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Install helm if not present
      shell: |
        curl https://get.helm.sh/helm-v3.12.0-linux-amd64.tar.gz -o helm.tar.gz
        tar -zxvf helm.tar.gz
        sudo mv linux-amd64/helm /usr/local/bin/helm
        rm -rf helm.tar.gz linux-amd64
      when: helm_check.rc != 0

    - name: Get target applications from localhost
      set_fact:
        target_applications: "{{ hostvars['localhost']['shared_target_applications'] }}"
        deploy_action: "{{ hostvars['localhost']['shared_operation'] | default('install') }}"

    - name: Loop over all target applications
      include_role:
        name: app_deploy
      vars:
        application: "{{ app_item }}"
        deploy_action: "{{ deploy_action }}"
      loop: "{{ target_applications }}"
      loop_control:
        loop_var: app_item  