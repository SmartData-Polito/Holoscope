---
# Deploy Applications Playbook - Fixed for Registry Host
- name: Set variables and prepare deployment
  hosts: registry
  gather_facts: false
  vars:
    operation: "{{ action | default('install') }}"
    force_deploy: "{{ force | default(false) | bool }}"
    
  tasks:    
    - name: Discover applications from group_vars files
      find:
        paths: "{{ inventory_dir }}/group_vars/"
        patterns: "*.yml"
      register: group_vars_files
      delegate_to: localhost

    - name: Extract application names from group_vars files
      set_fact:
        discovered_applications: "{{ group_vars_files.files | map(attribute='path') | map('basename') | map('regex_replace', '\\.yml$', '') | reject('in', ['all', 'master', 'agents', 'registry', 'deployment', 'ungrouped']) | list }}"
    
    - name: Pre-load all application group vars
      include_vars:
        file: "{{ inventory_dir }}/group_vars/{{ item }}.yml"
        name: "app_vars_{{ item }}"
      loop: "{{ discovered_applications }}"
    
    - name: Initialize enabled applications list
      set_fact:
        enabled_applications: []

    - name: Check which applications are enabled
      set_fact:
        enabled_applications: "{{ enabled_applications + [item] }}"
      loop: "{{ discovered_applications }}"
      when: 
        - vars['app_vars_' + item] is defined
        - (action | default('install')) == 'remove' or (vars['app_vars_' + item].enabled | default(true) | bool)
      
    - name: Set target applications
      set_fact:
        target_applications: "{{ applications | default(enabled_applications) }}"
      
    - name: Debug applications
      debug:
        msg:
          - "Applications to deploy/remove/upgrade: {{ target_applications }}"
          - "Operation: {{ operation }}"
          - "Force deploy: {{ force_deploy }}"

    - name: Create application directories on target hosts
      file:
        path: "/tmp/applications/{{ app_item }}/helm"
        state: directory
        mode: '0755'
      loop: "{{ target_applications }}"
      loop_control:
        loop_var: app_item
      when: target_applications | length > 0

    - name: Copy Helm charts to registry host
      synchronize:
        src: "{{ playbook_dir }}/../../../applications/{{ app_item }}/helm/"
        dest: "/tmp/applications/{{ app_item }}/helm/"
        delete: yes
        recursive: yes
        private_key: "{{ ansible_ssh_private_key_file | realpath }}"
      loop: "{{ target_applications }}"
      loop_control:
        loop_var: app_item
      when: target_applications | length > 0      

- name: Deploy Applications
  hosts: registry
  vars:
    operation: "{{ action | default('install') }}"
    force_deploy: "{{ force | default(false) | bool }}"
  environment:
    KUBECONFIG: "{{ ansible_env.HOME }}/.kube/kubeconfig.yaml"
  tasks:
    - name: Get git short SHA for image tag
      command: git rev-parse --short HEAD
      register: git_sha_result
      delegate_to: localhost
      changed_when: false

    - name: Set image tag from git SHA
      set_fact:
        image_tag: "{{ image_tag | default(git_sha_result.stdout) }}"

    - name: Display deploy image tag
      debug:
        msg: "Deploying with image tag: {{ image_tag }}"

    - name: Deploy each application
      include_role:
        name: app_deploy
      vars:
        application: "{{ app_item }}"
        deploy_action: "{{ operation }}"
        force_deploy: "{{ force_deploy }}"
        deploy_image_tag: "{{ image_tag }}"
      loop: "{{ target_applications }}"
      loop_control:
        loop_var: app_item
      when: target_applications | length > 0

    - name: Display deployment summary
      debug:
        msg: "Successfully processed applications: {{ target_applications | join(', ') }}"
      when: target_applications | length > 0