---
- name: Ensure master group is not empty
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check if master group exists and is not empty
      assert:
        that:
          - groups['master'] is defined
          - groups['master'] | length > 0
        fail_msg: "The 'master' group is empty or not defined in the inventory"

- name: Clean SSH host keys
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remove old host keys to avoid conflicts
      shell: ssh-keygen -f ~/.ssh/known_hosts -R {{ hostvars[item]['ansible_host'] }} || true
      loop: "{{ groups['agents'] }}"
      when: hostvars[item]['ansible_host'] is defined

- name: Get K3s token from master
  hosts: master[0]
  become: true
  tasks:
    - name: Retrieve K3s token for new nodes
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw
      no_log: true

    - name: Set K3s token fact
      set_fact:
        k3s_token: "{{ k3s_token_raw['content'] | b64decode | trim }}"
      no_log: true

- name: Identify and configure new nodes
  hosts: agents
  gather_facts: true
  tasks:
    - name: Check if WireGuard key files exist and have content
      shell: |
        if [ -s /etc/wireguard/publickey ] && [ -s /etc/wireguard/privatekey ]; then
          echo "valid"
        else
          echo "invalid"
        fi
      register: wg_keys_check
      changed_when: false
      become: true

    - name: Check if K3s agent is installed and running
      shell: systemctl is-active k3s-agent || echo "not_running"
      register: k3s_status_raw
      changed_when: false
      become: true

    - name: Set clean k3s status
      set_fact:
        k3s_status: "{{ k3s_status_raw.stdout.split('\n')[0] }}"
    
    - name: Register if node needs configuration
      set_fact:
        needs_config: "{{ (wg_keys_check.stdout | trim == 'invalid') or (k3s_status == 'not_running' or k3s_status == 'inactive') }}"
    
    - name: Debug configuration status
      debug:
        msg: "Node {{ inventory_hostname }} needs configuration: {{ needs_config }}"
    
    - name: Configure common role if needed
      import_role:
        name: common
      become: true  
      when: needs_config
      
    - name: Configure wireguard-client role if needed
      import_role:
        name: wireguard-client
      become: true  
      when: needs_config
      
    - name: Set K3s token from master
      set_fact:
        k3s_token: "{{ hostvars[groups['master'][0]]['k3s_token'] }}"
      when: needs_config
      no_log: true
      
    - name: Register node as configured
      set_fact:
        node_was_configured: "{{ needs_config }}"
      
    - name: Add to configured hosts list
      set_fact:
        configured_hosts: "{{ ansible_play_hosts | select('match', inventory_hostname) | list }}"
      when: needs_config
      run_once: true

- name: Update all WireGuard facts and configurations
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Check if WireGuard keys exist
      stat:
        path: /etc/wireguard/publickey
      register: wg_pubkey_file

    - name: Get public key from file if it exists
      command: cat /etc/wireguard/publickey
      register: publickey_contents
      changed_when: False
      when: wg_pubkey_file.stat.exists

    - name: Get private key from file if it exists
      command: cat /etc/wireguard/privatekey
      register: privatekey_contents
      changed_when: False
      when: wg_pubkey_file.stat.exists
      
    - name: Set WireGuard public key fact for hosts with keys
      set_fact:
        wireguard_public_key: "{{ publickey_contents.stdout }}"
      when: wg_pubkey_file.stat.exists
      
    - name: Set WireGuard private key fact for hosts with keys
      set_fact:
        wireguard_private_key: "{{ privatekey_contents.stdout }}"
      when: wg_pubkey_file.stat.exists
      
    - name: Set WireGuard IP fact for hosts with keys
      set_fact:
        wireguard_ip: "{{ wireguard_ip }}"  
      when: wg_pubkey_file.stat.exists and wireguard_ip is defined

- name: Update WireGuard server configuration
  hosts: master[0]
  become: true
  tasks:
    - name: Collect all hosts with WireGuard keys
      set_fact:
        vpn_peers: "{{ vpn_peers | default([]) + [item] }}"
      when: 
        - hostvars[item]['wireguard_public_key'] is defined
        - item != inventory_hostname
      loop: "{{ groups['all'] }}"
      
    - name: Update WireGuard server configuration
      include_role:
        name: wireguard-server
        tasks_from: update_config

- name: Configure K3s agent on new nodes
  hosts: agents
  become: true
  tasks:
    - name: Configure K3s agent if node was newly configured
      include_role:
        name: k3s-agent
      when: hostvars[inventory_hostname].get('node_was_configured', false) | bool

- name: Show summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Gather configured nodes from all agent hosts
      set_fact:
        all_configured_hosts: "{{ all_configured_hosts | default([]) + [item] }}"
      loop: "{{ groups['agents'] }}"
      when: 
        - hostvars[item] is defined
        - hostvars[item].get('node_was_configured', false) | bool

    - name: Display configured nodes
      debug:
        msg: "Successfully configured new nodes: {{ all_configured_hosts | default([]) | join(', ') }}"
      when: all_configured_hosts is defined and all_configured_hosts | length > 0
      
    - name: Display no changes message
      debug:
        msg: "No new nodes were configured. All nodes already have WireGuard and K3s agent installed."
      when: all_configured_hosts is not defined or all_configured_hosts | length == 0