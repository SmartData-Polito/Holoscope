---
- name: Build Docker Images
  hosts: registry
  gather_facts: false
  vars:
    # Which applications to build (default: all enabled)
    build_applications: "{{ applications | default([]) }}"
    
  tasks:    
    - name: Discover applications from group_vars files
      find:
        paths: "{{ inventory_dir }}/group_vars/"
        patterns: "*.yml"
      register: group_vars_files
      delegate_to: localhost

    - name: Extract application names from group_vars files
      set_fact:
        discovered_applications: "{{ group_vars_files.files | map(attribute='path') | map('basename') | map('regex_replace', '\\.yml$', '') | reject('in', ['all', 'master', 'agents', 'registry', 'deployment', 'ungrouped']) | list }}"
    
    - name: Pre-load all application group vars
      include_vars:
        file: "{{ inventory_dir }}/group_vars/{{ item }}.yml"
        name: "app_vars_{{ item }}"
      loop: "{{ discovered_applications }}"
      ignore_errors: true
    
    - name: Initialize enabled applications list
      set_fact:
        enabled_applications: []

    - name: Check which applications are enabled and have docker images
      set_fact:
        enabled_applications: "{{ enabled_applications + [item] }}"
      loop: "{{ discovered_applications }}"
      when: 
        - vars['app_vars_' + item] is defined
        - vars['app_vars_' + item].enabled | default(true) | bool
        - vars['app_vars_' + item].docker_images is defined
      
    - name: Set target applications for building
      set_fact:
        target_build_applications: "{{ build_applications if build_applications | length > 0 else enabled_applications }}"
      
    - name: Debug applications
      debug:
        msg:
          - "Applications to build: {{ target_build_applications }}"

    - name: Remove old host key to avoid conflicts
      shell: ssh-keygen -f ~/.ssh/known_hosts -R {{ ansible_host }} || true
      delegate_to: localhost
      run_once: true
      when: target_build_applications | length > 0

    - name: Create application directories on target hosts
      file:
        path: "/tmp/applications/{{ app_item }}/docker"
        state: directory
        mode: '0755'
      loop: "{{ target_build_applications }}"
      loop_control:
        loop_var: app_item
      when: target_build_applications | length > 0

    - name: Sync only Docker contexts for target applications using rsync
      synchronize:
        src: "{{ playbook_dir }}/../../../applications/{{ app_item }}/docker/"
        dest: "/tmp/applications/{{ app_item }}/docker/"
        delete: yes
        recursive: yes
        private_key: "{{ ansible_ssh_private_key_file | realpath }}"
      loop: "{{ target_build_applications }}"
      loop_control:
        loop_var: app_item
      when: target_build_applications | length > 0

    - name: Build images for each application
      include_role:
        name: docker_build
      vars:
        application: "{{ app_item }}"
      loop: "{{ target_build_applications }}"
      loop_control:
        loop_var: app_item
      when: target_build_applications | length > 0

    - name: Display build summary
      debug:
        msg: "Successfully built Docker images for: {{ target_build_applications | join(', ') }}"
      when: target_build_applications | length > 0

    - name: Display no build message
      debug:
        msg: "No applications found with docker_images configuration to build"
      when: target_build_applications | length == 0