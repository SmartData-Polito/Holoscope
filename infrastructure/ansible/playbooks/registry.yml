---
- name: Copy file from master to registry hosts
  hosts: registry
  tasks:
    - name: Read kubeconfig from master
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_content
      delegate_to: "{{ groups['master'][0] }}"
      become: true
      run_once: true

    - name: Ensure .kube directory exists
      file:
        path: ~/.kube
        state: directory
        mode: '0755'

    - name: Parse and modify kubeconfig
      set_fact:
        modified_kubeconfig: "{{ kubeconfig_parsed | combine(kubeconfig_modifications, recursive=True) | to_nice_yaml }}"
      vars:
        kubeconfig_parsed: "{{ kubeconfig_content.content | b64decode | from_yaml }}"
        kubeconfig_modifications:
          clusters:
            - cluster:
                server: "{{ k3s_url }}"
                insecure-skip-tls-verify: true
              name: "{{ kubeconfig_parsed.clusters[0].name }}"

    - name: Write modified kubeconfig to registry hosts
      copy:
        content: "{{ modified_kubeconfig }}"
        dest: ~/.kube/kubeconfig.yaml
        mode: '0600'
      become: false

    - name: Create helm charts directory
      file:
        path: ~/helm-charts
        state: directory
        mode: '0755'

    - name: Copy Helm chart to registry host
      copy:
        src: "{{ project_root }}/infrastructure/helm/registry/"
        dest: ~/helm-charts/registry/
        mode: '0644'

    - name: Deploy registry with Helm module
      kubernetes.core.helm:
        name: "registry-{{ item }}"
        chart_ref: "~/helm-charts/registry"
        release_namespace: registry
        create_namespace: true
        kubeconfig: "~/.kube/kubeconfig.yaml"
        values:
          name: "registry-{{ item }}"
          appName: "registry-{{ item }}"
          nodeAffinity:
            hostname:
              values:
                - "{{ item }}"
          service:
            loadBalancerIP: "{{ hostvars[groups['registry'][0]]['wireguard_ip'] }}"
            nodePort: "{{ local_registry.split(':')[1] | int }}"
          volumes:
            hostPath: "/data/registry-{{ item }}"
            capacity: "100Gi"
          networkPolicy:
            allowedCidrs: "{{ network_policy.allowed_cidrs }}"
      with_items: "{{ groups['registry'] }}"

- name: Append to /etc/hosts file on all machines in a group
  hosts: master:agents
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Append entry to /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: '^.*\sregistry\.local\s*$'
        line: "{{ hostvars[groups['registry'][0]]['wireguard_ip'] }} registry {{ local_registry.split(':')[0] }}"
        state: present
        insertafter: EOF

- name: Configure K3s to trust insecure registry
  hosts: master:agents
  become: true
  tasks:
    - name: Create K3s registries directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Configure K3s registries.yaml
      copy:
        content: |
          mirrors:
            "{{ local_registry }}":
              endpoint:
                - "https://{{ local_registry }}"
          configs:
            "{{ local_registry }}":
              tls:
                insecure_skip_verify: true
        dest: /etc/rancher/k3s/registries.yaml
        mode: '0644'

    - name: Restart K3s service
      systemd:
        name: "{{ 'k3s' if inventory_hostname in groups['master'] else 'k3s-agent' }}"
        state: restarted

- name: Setup registry certificates
  hosts: registry
  environment:
    KUBECONFIG: "{{ ansible_env.HOME }}/.kube/kubeconfig.yaml"
  tasks:
    - name: Block until registry pod is Ready
      command: >
        kubectl wait pod
          -n registry
          -l app.kubernetes.io/name=registry-{{ groups['registry'][0] }}
          --for=condition=Ready=True
          --timeout=300s
      register: wait_result
      failed_when: wait_result.rc != 0

    - name: Get registry Pod name
      command: >
        kubectl get pods
          -n registry
          -l app.kubernetes.io/name=registry-{{ groups['registry'][0] }}
          -o jsonpath='{.items[0].metadata.name}'
      register: registry_pod
      changed_when: false

    - name: Extract registry certificate
      shell: |
        kubectl exec -n registry {{ registry_pod.stdout }} -- cat /certs/tls.crt > /tmp/registry.crt
      args:
        executable: /bin/bash
      register: cert_extract

    - name: Create certificate directory on all nodes
      file:
        path: /etc/docker/certs.d/{{ local_registry }}/
        state: directory
        mode: '0755'
      delegate_to: "{{ item }}"
      loop: "{{ groups['master'] + groups['agents'] }}"
      become: true

    - name: Read certificate content from registry host
      slurp:
        src: /tmp/registry.crt
      register: registry_cert_content

    - name: Copy certificate to all nodes
      copy:
        content: "{{ registry_cert_content.content | b64decode }}"
        dest: /etc/docker/certs.d/{{ local_registry }}/ca.crt
        mode: '0644'
      delegate_to: "{{ item }}"
      loop: "{{ groups['master'] + groups['agents'] }}"
      become: true

- name: Verify registry accessibility
  hosts: master[0]
  become: true
  tasks:
    - name: Pull test image
      shell: |
        docker pull busybox:latest
        docker tag busybox:latest {{ local_registry }}/busybox:latest
        docker push {{ local_registry }}/busybox:latest
    
    - name: Test registry access with curl
      shell: |
        curl -k https://{{ local_registry }}/v2/_catalog
      register: registry_catalog
      
    - name: Display registry catalog
      debug:
        var: registry_catalog.stdout

    - name: Verify image can be pulled from registry
      shell: |
        docker rmi {{ local_registry }}/busybox:latest || true
        docker pull {{ local_registry }}/busybox:latest
      register: pull_result
        
    - name: Display pull result
      debug:
        var: pull_result.stdout_lines