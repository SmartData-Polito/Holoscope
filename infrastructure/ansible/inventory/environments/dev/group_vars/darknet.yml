---
# Development Darknet Application Configuration
enabled: true
namespace: darknet
chart_path: "{{ playbook_dir }}/../../../applications/darknet/helm"

# Docker images to build
docker_images:
  - name: "ipv4"
    author: "public" 
    path: "applications/darknet/docker/ipv4"
    dockerfile: "Dockerfile"
    tag: "latest"
    
  - name: "collector"
    author: "public"
    path: "applications/darknet/docker/collector"
    dockerfile: "Dockerfile" 
    tag: "latest"

# Helm chart values
values:
  global:
    storageClass: "{{ storage_class | default('manual') }}"

  # Node configurations
  captureNodes:
    worker-00:
      enabled: true
      config:
        interface: eth0
        rotate_seconds: 1800
        filter: "ip and (net 192.168.10.0/24)"
        outputPath: "/data/darknet/worker-00/trace-%Y%m%d_%H-%M-%S_%s.pcap"
      storage:
        hostPath: "/data/darknet/worker-00"
      arp:
        enabled: true
        ipv4:
          enabled: true

    worker-01:
      enabled: true
      config:
        interface: eth0
        rotate_seconds: 1800
        filter: "ip and (net 192.168.20.0/24)"
        outputPath: "/data/darknet/worker-01/trace-%Y%m%d_%H-%M-%S_%s.pcap"
      storage:
        hostPath: "/data/darknet/worker-01"
      arp:
        enabled: false
        
  # Collector configuration
  collector:
    enabled: true
    config:
      workerNodes: 
        - "worker-00"
        - "worker-01"
      sshUsers: 
        - "vagrant"
        - "vagrant"
      srcPath: "/data/darknet"
      dstPath: "/data/collector"
      collectionInterval: "60"
    storage:
      hostPath: "/data/collector"
      size: "10Gi"  
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  # Network policy
  networkPolicy:
    enabled: true
    allowedCidrs:
      - "10.0.0.0/8"