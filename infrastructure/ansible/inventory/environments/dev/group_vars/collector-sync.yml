---
# Development Collector-Sync Application Configuration
enabled: false
namespace: collector-sync
chart_path: "{{ playbook_dir }}/../../../applications/collector-sync/helm"

# Docker images to build
docker_images:
  - name: "capture"
    author: "public"
    path: "applications/collector-sync/docker/capture"
    dockerfile: "Dockerfile"
    tag: "latest"

  - name: "collector"
    author: "public"
    path: "applications/collector-sync/docker/collector"
    dockerfile: "Dockerfile"
    tag: "latest"

  - name: "ssh-keygen"
    author: "public"
    path: "applications/collector-sync/docker/ssh-keygen"
    dockerfile: "Dockerfile"
    tag: "latest"

# Helm chart values — only env-specific overrides
values:
  captureNodes:
    worker-00:
      enabled: true
      config:
        interfaces:
          - interface: eth0
        rotate_seconds: 60
        filter: "ip and (net 192.168.10.0/24)"
      storage:
        hostPath: "/data/darknet/worker-00"
    worker-01:
      enabled: true
      config:
        interfaces:
          - interface: eth0
        rotate_seconds: 60
        filter: "ip and (net 192.168.20.0/24)"
      storage:
        hostPath: "/data/darknet/worker-01"

  collector:
    enabled: true
    mode: "cronjob"
    schedule: "*/1 * * * *"  # Every minute for testing
    hostAliases: []  # Populate with worker IPs if needed
    workers:
      worker-00:
        enabled: true
        target: "worker-00:65222"
        sshUser: "capture"
        srcPath: "/data/darknet"
        dstPath: "/data/collector/worker-00"
      worker-01:
        enabled: false
        target: "worker-01:65222"
        sshUser: "capture"
        srcPath: "/data/darknet"
        dstPath: "/data/collector/worker-01"
    config:
      logLevel: "DEBUG"
    storage:
      hostPath: "/data/collector"
      size: "10Gi"
