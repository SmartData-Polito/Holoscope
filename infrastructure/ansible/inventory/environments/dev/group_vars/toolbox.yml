---
# Development l4responder Application Configuration
enabled: true
namespace: toolbox
chart_path: "{{ playbook_dir }}/../../../applications/toolbox/helm"
docker_images:
  - name: "toolbox"
    author: "public"
    path: "applications/toolbox/docker/"
    dockerfile: "Dockerfile"
    tag: "latest"
values:
  toolbox:
    enabled: true
    labels:
      app: toolbox
    l4responder:
      labels:
        app: l4responder-server
      container:
        hostPort: 60000
    darknet:
      labels:
        app: darknet
    workers:
      worker-00:
          enabled: true
          l4responder:
            portRanges:
                - start: 10000
                  end: 10100
                - start: 30000
                  end: 30100
            
            ipRanges:
                - network: "10.0.0.0/24"
                - network: "10.10.0.0/24"
          darknet:
              ipRanges:
              - network: "10.0.0.0/24" # to be fixed

