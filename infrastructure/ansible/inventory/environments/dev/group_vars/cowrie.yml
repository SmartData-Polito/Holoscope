---
# Development cowrie Application Configuration
enabled: false
namespace: cowrie
chart_path: "{{ playbook_dir }}/../../../applications/cowrie/helm"

# No custom docker images needed - using official cowrie/cowrie from Docker Hub
docker_images: []

values:
  global:
    namespace: cowrie

  cowrie:
    image:
      repository: cowrie/cowrie
      tag: "latest"
      pullPolicy: IfNotPresent
    
    container:
      name: cowrie
      port: 2222  # Cowrie internal port
    
    service:
      type: NodePort
      port: 22    # External SSH port
      targetPort: 2222
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    persistence:
      enabled: true
      type: "hostPath" 
      size: 5Gi

  # Configure deployments per node with specific IPs
  deployments:
    worker-00:
      enabled: true
      nodeSelector: "worker-00"
      storage:
        hostPath: "/data/cowrie/worker-00"
      exposedIPs:
        - "192.168.10.10"
        - "192.168.10.11"
        - "192.168.10.12"
        - "192.168.10.13"
        - "192.168.10.14"
    
    worker-01:
      enabled: true
      nodeSelector: "worker-01"
      storage:
        hostPath: "/data/cowrie/worker-01"
      exposedIPs:
        - "192.168.20.20"
        - "192.168.20.21"
        - "192.168.20.22"
        - "192.168.20.23"
        - "192.168.20.24"
    