#infrastructure/ansible/inventory/dev/group_vars/all.yml
---
helm_version: "v3.18.3"
k3s_version: "v1.33.1+k3s1"
k3s_url: "https://10.0.0.100:6443"

# Project paths - using playbook_dir as base since that's where ansible runs from
project_root: "{{ playbook_dir }}/../../../"

# Docker registry configuration
local_registry: "registry.local:5000"
image_tag: "latest"

# This policy applies to the registry service
network_policy:
  allowed_cidrs:
    - 10.0.0.0/24  
