#infrastructure/ansible/inventory/group_vars/all.yml
---
# Global variables for all hosts
helm_version: "v3.7.0"
k3s_version: "v1.30.4+k3s1"
k3s_url: "https://10.0.0.100:6443"

project_root: "{{ playbook_dir | dirname | dirname }}"
vagrant_key_dir: "{{ project_root }}/vagrant/.vagrant/machines"

network_policy:
  allowed_cidrs:
    - 10.0.0.0/24  

# Docker registry configuration
local_registry: "registry.local:30500"
image_tag: "latest"