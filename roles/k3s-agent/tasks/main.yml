---
- name: Install and configure K3s
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - agent \
    --flannel-iface={{ wireguard_interface }} \
    --node-ip={{ wireguard_ip }} \
    --token="{{ hostvars[groups['master'][0]].k3s_token }}" \
    --server="{{ k3s_url }}" \
    --node-name="{{ inventory_hostname }}" \
    --debug \
    --docker