- name: Ensure collector directories exist on master
  file:
    path: "{{ application_vars.collector_dstPath }}"
    state: directory
    mode: '0755'
  delegate_to: "{{ item }}"
  loop: "{{ groups[application] }}"
  become: true

- name: Copy SSH private key for collector
  copy:
    src: "{{ playbook_dir }}/../{{ hostvars[groups['master'][0]]['ansible_ssh_private_key_file'] }}"
    dest: "/tmp/collector-ssh-key"
    mode: '0600'
  delegate_to: localhost
  run_once: true

- name: Base64 encode SSH key for Kubernetes secret
  shell: "cat /tmp/collector-ssh-key | base64 -w 0"
  register: ssh_key_base64
  delegate_to: localhost
  run_once: true

- name: Set worker nodes fact
  set_fact:
    collector_worker_nodes: "{{ groups['darknet'] | join(',') }}"
  run_once: true

- name: Set worker nodes and SSH users facts
  set_fact:
    collector_worker_nodes: "{{ groups['darknet'] | join(' ') }}"
    collector_ssh_users: "{% for host in groups['darknet'] %}{{ hostvars[host]['ansible_user'] }}{% if not loop.last %} {% endif %}{% endfor %}"
  run_once: true

- name: Deploy Collector Helm chart on master node
  shell: >
    helm upgrade -i collector
    {{ playbook_dir }}/../resources/helm-charts/{{ application }}
    --namespace {{ application_vars.collector_namespace }}
    --create-namespace
    --set nodeAffinity.hostname.values[0]={{ groups[application][0] }}
    --set config.workerNodes="{{ collector_worker_nodes }}"
    --set config.sshUsers="{{ collector_ssh_users }}"
    --set config.srcPath="{{ application_vars.collector_srcPath }}"
    --set config.dstPath="{{ application_vars.collector_dstPath }}"
    --set config.collectionInterval="{{ application_vars.collector_interval }}"
    --set image.repository="{{ local_registry }}/public/collector"
    --set image.tag="{{ image_tag }}"
    --set volumes.pv.hostPath.path="{{ application_vars.collector_dstPath }}"
    --set sshKeySecret.name=collector-ssh-key
    --set sshKeySecret.type=Opaque
    --set-string sshKeySecret.data.id_rsa="{{ ssh_key_base64.stdout }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default(lookup('env','HOME') + '/.kube/k3s-kubeconfig.yaml') }}"
  run_once: true

- name: Clean up temporary SSH key file
  file:
    path: "/tmp/collector-ssh-key"
    state: absent
  delegate_to: localhost
  run_once: true