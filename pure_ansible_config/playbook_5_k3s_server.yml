
    - name: Stop k3s from the server node
      shell: /usr/local/bin/k3s-killall.sh
      failed_when: false
      
    - name: Remove k3s from the server node
      shell: /usr/local/bin/k3s-uninstall.sh
      failed_when: false
      
    - name: Install and configure K3s
      shell: |
           curl -sfL https://get.k3s.io | K3S_KUBECONFIG_MODE="644" INSTALL_K3S_EXEC="server" sh -s -  --advertise-address="{{hostvars[ inventory_hostname ].ip_vpn}}"  --flannel-iface="wg0" --debug
           
    - name: Retrive K3S token for adding future node   
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: token_cluster
      
    - set_fact:
        k3s_token : "{{ token_cluster['content'] | b64decode | replace('\n', '')}}"
