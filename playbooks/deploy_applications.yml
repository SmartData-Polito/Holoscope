---
# ansible-playbook -i inventory/hosts.yml --ask-vault-password playbooks/deploy_applications.yml  --ask-become-pass
#jinja2: trim_blocks:True
- name: Copy and modify file from remote host
  hosts: deployment
  vars:
    ansible_python_interpreter: /usr/bin/python3  
    # Default to all applications in deployed_applications if none specified
    target_applications: "{{ applications | default(deployed_applications) }}"
    # Default to install if no action specified
    operation: "{{ action | default('install') }}"
  tasks:
    - name: Fetch Kubeconfig from the remote host
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~/.kube/kubeconfig.yaml
        flat: yes
      delegate_to: "{{ groups['master'][0] }}"
      register: fetch_result

    - name: Change Kubeconfig permissions
      ansible.builtin.file:
        path: "{{ fetch_result.dest }}"
        mode: "go-r"

    - name: Ensure yq is installed on localhost
      become: true
      apt:
        name: yq
        state: present
      run_once: true

    - name: Modify the server URL in the YAML file using yq
      become: true
      shell: |
       yq eval '.clusters[0].cluster.server = "https://{{ hostvars[groups["master"][0]].ansible_host }}:6443"' -i {{ fetch_result.dest }}

    - name: Verify Helm installation
      command: helm version

    - name: Ensure Helm is installed
      command: helm version
      register: helm_version
      changed_when: False
      failed_when: "'version' not in helm_version.stdout"

    - name: Add kubernetes-dashboard repository
      ansible.builtin.command:
        cmd: helm repo add kubernetes-dashboard https://kubernetes.github.io/dashboard/
      register: add_repo
      changed_when: "'Kubernetes Dashboard has been added' in add_repo.stdout"
      
    - name: Update helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      when: add_repo is changed

    # Get applications that are enabled in the inventory
    - name: Identify enabled applications
      set_fact:
        enabled_applications: >-
          {% set apps = [] %}
          {% for app in application_registry.keys() %}
            {% if app in groups and groups[app] | length > 0 %}
              {% set app_vars = lookup('vars', app + '_vars', default={"enabled": false}) %}
              {% if app_vars.enabled | default(hostvars[groups[app][0]].enabled | default(false)) %}
                {% set _ = apps.append(app) %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ apps }}
      
    # Allow overriding via command line, otherwise use enabled applications
    - name: Set applications to deploy
      set_fact:
        applications_to_deploy: "{{ target_applications | default(enabled_applications) }}"

    # Deploy or remove applications
    - name: Deploy or remove applications
      include_role:
        name: "{{ application }}"
        tasks_from: "{{ operation }}.yml"
      loop: "{{ applications_to_deploy }}"
      loop_control:
        loop_var: application
      when: application in groups and groups[application] | length > 0