global:
  namespace: clickhouse
  storageClass: local-path

clickhouse:
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.8"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    httpPort: 8123
    nativePort: 9000

  node:
    hostname: master-00

  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  persistence:
    hostPath: /data/clickhouse
    size: "200Gi"

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Database credentials (overridden by Ansible per env)
  database: "holoscope"
  user: ""
  password: ""

  # IP allowlist for the database user (ClickHouse-level restriction)
  allowedNetworks: []

networkPolicy:
  enabled: false
  allowedCidr: "10.0.0.0/8"
