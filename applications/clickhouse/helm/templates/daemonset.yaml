{{- if .Values.global.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "clickhouse.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "clickhouse.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "clickhouse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "clickhouse.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.clickhouse.node.hostname | quote }}
      {{- with .Values.clickhouse.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.clickhouse.service.httpPort }}
            - name: native
              containerPort: {{ .Values.clickhouse.service.nativePort }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          {{- with .Values.clickhouse.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.clickhouse.persistence.hostPath | quote }}
            type: DirectoryOrCreate
        - name: initdb
          configMap:
            name: {{ include "clickhouse.fullname" . }}-initdb

{{- end }}