{{- if .Values.clickhouse.s3.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickhouse.fullname" . }}-s3-storage
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "clickhouse.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  storage.xml: |
    <clickhouse>
      <storage_configuration>
        <disks>
          <s3>
            <type>s3</type>
            <endpoint>{{ .Values.clickhouse.s3.endpoint }}</endpoint>
            <access_key_id>{{ .Values.clickhouse.s3.accessKeyId }}</access_key_id>
            <secret_access_key>{{ .Values.clickhouse.s3.secretAccessKey }}</secret_access_key>
          </s3>
        </disks>
        <policies>
          <s3_main>
            <volumes>
              <main>
                <disk>s3</disk>
              </main>
            </volumes>
          </s3_main>
        </policies>
      </storage_configuration>
    </clickhouse>
{{- end }}
