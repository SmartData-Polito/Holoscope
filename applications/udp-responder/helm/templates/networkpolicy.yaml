{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "udpresponder.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "udpresponder.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "udpresponder.selectorLabels" . | nindent 6 }}

  policyTypes:
  - Ingress
  - Egress

  # No Kubernetes-level ingress needed (captures via hostNetwork BPF)
  ingress: []

  egress:
  # ClickHouse native protocol
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: clickhouse
    ports:
    - protocol: TCP
      port: {{ .Values.clickhouse.port | int }}
  # DNS resolution
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
{{- end }}
