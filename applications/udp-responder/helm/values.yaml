# applications/udp-responder/helm/values.yaml
global:
  namespace: udp-responder
  storageClass: local-path

# Image tag — overridden at deploy time with git SHA
image_tag: latest

# Per-node configurations (populated by Ansible)
udpResponderNodes: {}

# Image configurations
containers:
  udpresponder:
    repository: registry.local:5000/public/udp-responder
    pullPolicy: IfNotPresent

# Network configuration
network:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

# Security context — capabilities-based, not privileged
securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
    add:
      - NET_ADMIN
      - NET_RAW

# Resource limits
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ClickHouse connection (credentials overridden by Ansible)
clickhouse:
  host: "clickhouse.clickhouse.svc.cluster.local"
  port: "9000"
  database: ""
  user: ""
  password: ""
  clientName: "udpspoofer-client"

# Network policy
networkPolicy:
  enabled: true

# Application tuning
env:
  channelSize: "100000"
  tcpPassiveInsertBatchSize: "5000"
  tcpReactiveInsertBatchSize: "50000"
  udpPassiveInsertBatchSize: "5000"
  udpReactiveInsertBatchSize: "25000"
  udpIpLimit: "300"
  udpSubnetLimit: "900"
  udpEndpointLimit: "1000"
  udpRlWindowMinutes: "1"
  udpRlBlockTtlMinutes: "60"
  udpRlCleanupIntervalMinutes: "10"
  udpEntryCleanupIntervals: "12"
  logLevel: "info"
  staticDropLogSecs: "30"
