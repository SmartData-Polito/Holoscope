version: "3"
services:
  # SSH key generator service
  ssh-keygen:
    build:
      context: ./ssh-keygen
      dockerfile: Dockerfile
    image: collector-sync-ssh-keygen:latest
    container_name: collector-sync-keygen
    volumes:
      - ssh-keys:/tmp/ssh-keys
    environment:
      - K8S_MODE=false
      - KEY_PATH=/tmp/ssh-keys
      - KEY_NAME=id_rsa
      - KEY_COMMENT=collector-sync-compose
        
  # PCAP capture service with SSH server (custom image)
  pcap-capture:
    build:
      context: ./capture
      dockerfile: Dockerfile
    image: collector-sync-capture:latest
    container_name: collector-sync-capture
    hostname: worker-capture
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /tmp/darknet:/data/darknet
      - ssh-keys:/etc/ssh-keys:ro
    environment:
      - INTERFACE=eth0
      - FILTER=ip and (net 10.0.0.0/24)
      - ROTATE_SECONDS=60
      - NODE_NAME=worker
    networks:
      collector-sync-net:
        aliases:
          - worker-capture
    depends_on:
      ssh-keygen:
        condition: service_completed_successfully
        
    
  # PCAP collector service
  pcap-collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    image: pcap-collector:latest
    container_name: collector-sync-collector
    hostname: collector
    restart: unless-stopped
    volumes:
      - ssh-keys:/etc/ssh-keys:ro
      - /tmp/collector:/data/collector
    environment:
      - WORKER_NODE=worker-capture:65222
      - SSH_USER=capture
      - COLLECTION_INTERVAL=60
      - LOG_LEVEL=INFO
      - RUN_MODE=daemon  
    networks:
      - collector-sync-net
    depends_on:
      ssh-keygen:
        condition: service_completed_successfully
      pcap-capture:
        condition: service_started
    healthcheck:
      test: ["CMD", "/collector.sh", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    
volumes:
  ssh-keys:
    driver: local
    
networks:
  collector-sync-net:
    driver: bridge