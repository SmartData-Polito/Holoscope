# applications/collector-sync/helm/values.yaml
global:
  namespace: collector-sync
  storageClass: manual

# Image tag — overridden at deploy time with git SHA
image_tag: latest

# Default per-node capture configurations (empty - populated by Ansible)
captureNodes: {}

captureImage:
  repository: registry.local:5000/public/capture
  pullPolicy: IfNotPresent

sshKeygenImage:
  repository: registry.local:5000/public/ssh-keygen
  pullPolicy: IfNotPresent

# Collector defaults
collector:
  enabled: true
  mode: "deployment"  # default to deployment
  schedule: "*/5 * * * *"  # default schedule
  image:
    repository: registry.local:5000/public/collector
    pullPolicy: IfNotPresent
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  config:
    workerNodes: []  # Populated by Ansible
    sshUsers: []     # Populated by Ansible
    srcPath: "/data/darknet"
    dstPath: "/data/collector"
    collectionInterval: "3600"
    logLevel: "INFO"
    runMode: "deployment"
  storage:
    hostPath: "/data/collector"
    size: "50Gi"
  sshKeySecret: collector-ssh-key
  resources: 
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

# Network configuration
network:
  # Use host network for packet capture
  hostNetwork: true
  # DNS policy when using host network
  dnsPolicy: ClusterFirstWithHostNet

# Security context (container-level)
securityContext:
  # Required for packet capture
  privileged: false
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
  
# Network policy 
networkPolicy:
  enabled: false
  allowedCidrs:
    - "10.0.0.0/24"
    
# Resource limits
resources:
  capture:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"