{{- if and .Values.collector.enabled (eq .Values.collector.mode "cronjob") }}
{{- range $workerName, $workerConfig := .Values.collector.workers }}
{{- if $workerConfig.enabled }}
---
# ConfigMap for {{ $workerName }} collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "collector-sync.fullname" $ }}-collector-{{ $workerName }}-config
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "collector-sync.collector.labels" $ | nindent 4 }}
    collector-sync.io/worker: {{ $workerName }}
data:
  # Single worker configuration for {{ $workerName }}
  WORKER_NODE: {{ $workerConfig.target | quote }}
  SSH_USER: {{ $workerConfig.sshUser | quote }}
  SOURCE_PATH: {{ $workerConfig.srcPath | quote }}
  DEST_PATH: {{ $workerConfig.dstPath | quote }}
  LOG_LEVEL: {{ $.Values.collector.config.logLevel | quote }}
  RUN_MODE: {{ $.Values.collector.config.runMode | quote }}
---
# CronJob for {{ $workerName }} collector (runs on master)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "collector-sync.fullname" $ }}-collector-{{ $workerName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "collector-sync.collector.labels" $ | nindent 4 }}
    collector-sync.io/worker: {{ $workerName }}
spec:
  schedule: {{ $.Values.collector.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1  # Keep only 1 successful job
  failedJobsHistoryLimit: 1      # Keep only 1 failed job
  
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            {{- include "collector-sync.collector.labels" $ | nindent 12 }}
            collector-sync.io/worker: {{ $workerName }}
        spec:
          restartPolicy: Never

          {{- if $.Values.collector.hostAliases }}
          hostAliases:
            {{- toYaml $.Values.collector.hostAliases | nindent 10 }}
          {{- end }}

          # Run on master node
          nodeSelector:
            {{- toYaml $.Values.collector.nodeSelector | nindent 12 }}
          
          containers:
          - name: collector
            image: "{{ $.Values.collector.image.repository }}:{{ $.Values.image_tag }}"
            imagePullPolicy: {{ $.Values.collector.image.pullPolicy }}
            
            envFrom:
            - configMapRef:
                name: {{ include "collector-sync.fullname" $ }}-collector-{{ $workerName }}-config
            
            volumeMounts:
            - name: ssh-keys
              mountPath: /etc/ssh-keys
              readOnly: true
            - name: collector-storage
              mountPath: {{ $.Values.collector.storage.hostPath }}
            
            resources:
              {{- toYaml $.Values.collector.resources | nindent 14 }}
          
          volumes:
          - name: ssh-keys
            secret:
              secretName: {{ $.Values.collector.sshKeySecret }}
              defaultMode: 0600
          - name: collector-storage
            hostPath:
              path: {{ $.Values.collector.storage.hostPath }}
              type: DirectoryOrCreate
{{- end }}
{{- end }}
{{- end }}