{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "collector-sync.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "collector-sync.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "collector-sync.selectorLabels" . | nindent 6 }}
  
  policyTypes:
  - Ingress
  - Egress
  
  # Allow ingress from specific CIDRs
  ingress:
  {{- range .Values.networkPolicy.allowedCidrs }}
  - from:
    - ipBlock:
        cidr: {{ . }}
  {{- end }}
  
  # Allow egress to worker nodes for SSH collection
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 65222
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
{{- end }}