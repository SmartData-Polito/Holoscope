{{- range $nodeName, $nodeConfig := .Values.captureNodes }}
{{- if $nodeConfig.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "collector-sync.fullname" $ }}-capture-{{ $nodeName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "collector-sync.capture.labels" $ | nindent 4 }}
    collector-sync.io/node: {{ $nodeName }}
spec:
  selector:
    matchLabels:
      {{- include "collector-sync.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: capture
      collector-sync.io/node: {{ $nodeName }}
  template:
    metadata:
      labels:
        {{- include "collector-sync.capture.labels" $ | nindent 8 }}
        collector-sync.io/node: {{ $nodeName }}
    spec:
      hostNetwork: {{ $.Values.network.hostNetwork }}
      dnsPolicy: {{ $.Values.network.dnsPolicy }}
      
      nodeSelector:
        kubernetes.io/hostname: {{ $nodeName }}
      
      containers:
      - name: capture
        image: "{{ $.Values.captureImage.repository }}:{{ $.Values.image_tag }}"
        imagePullPolicy: {{ $.Values.captureImage.pullPolicy }}
        
        securityContext:
          {{- toYaml $.Values.securityContext | nindent 10 }}
        
        env:
        - name: NODE_NAME
          value: {{ $nodeName }}
        - name: SSH_LISTEN_ADDRESS
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: INTERFACES
          value: "{{- range $int := $nodeConfig.config.interfaces }} -i {{ $int.interface }} {{- end }}"
        - name: FILTER
          value: {{ $nodeConfig.config.filter | quote }}
        - name: ROTATE_SECONDS
          value: {{ $nodeConfig.config.rotate_seconds | quote }}
        
        volumeMounts:
        - name: capture-data
          mountPath: /data/darknet
        - name: ssh-keys
          mountPath: /etc/ssh-keys
          readOnly: true
        
        resources:
          {{- toYaml $.Values.resources.capture | nindent 10 }}
      
      volumes:
      - name: capture-data
        hostPath:
          path: {{ $nodeConfig.storage.hostPath }}
          type: Directory
      - name: ssh-keys
        secret:
          secretName: {{ $.Values.collector.sshKeySecret }}
          defaultMode: 0600
      
      restartPolicy: Always
{{- end }}
{{- end }}