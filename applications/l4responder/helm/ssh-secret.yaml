{{- if .Values.l4responder.enabled }}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-creator-sa
  namespace: l4responder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-writer
  namespace: l4responder
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: allow-secret-creator-sa
  namespace: l4responder
subjects:
- kind: ServiceAccount
  name: secret-creator-sa
  namespace: l4responder
roleRef:
  kind: Role
  name: secret-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kubeconfig-secret-creator
  namespace: l4responder
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 1
  template:
    metadata:
      name: kubeconfig-secret-creator
    spec:
      serviceAccountName: secret-creator-sa
      restartPolicy: Never
      containers:
      - name: creator
        securityContext:
          runAsUser: 0
        image: bitnami/kubectl:latest
        command:
          - /bin/sh
          - -c
          - |
            echo "Running inside Job, creating/updating secret..."

            # Dump current kubeconfig to a file
            kubectl config view --raw > /tmp/kubeconfig.yaml
            
            # Create or update secret from file
            kubectl create secret generic kubeconfig \
              --from-file=config=/tmp/kubeconfig.yaml \
              --namespace=l4responder \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Secret created or updated!"
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
      volumes:
      - name: tmp-volume
        emptyDir: {}

{{- end }}