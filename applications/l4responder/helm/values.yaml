global:
  namespace: l4responder
  storageClass: manual


l4responder_toolbox:
  name: l4responder-toolbox
  labels:
     app: l4responder-toolbox
  container:
    name: toolbox
    image:
      repository: registry.local:30500/public/l4responder_toolbox
      tag: latest
      pullPolicy: Always
  serviceAccount:
    name: toolbox-sa
  securityContext:
    privileged: true
  network:
    hostNetwork: true
  terminationGracePeriodSeconds: 10
  rbac:
    clusterRole:
      name: pod-reader
      rules:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list", "watch"]
          
    clusterRoleBinding:
        name: toolbox-sa-binding

l4responder_server:
  labels:
     app: l4responder-server
  container:
    name: responder
    image:
      repository: registry.local:30500/public/l4responder_server 
      tag: latest
      pullPolicy: Always
    containerPort: 60000
    hostPort: 60000 
networkPolicy:
  enabled: false
  allowedCidrs:
    - "10.0.0.0/24"