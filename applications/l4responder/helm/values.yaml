global:
  namespace: l4responder
  storageClass: manual

container_port: 30000
host_port: 30000

l4responder_server:
  labels:
     app: l4responder
  terminationGracePeriodSeconds: 0
  container:
    name: responder
    image:
      repository: registry.local:5000/public/l4responder_server 
      tag: latest
      pullPolicy: Always
