global:
  namespace: l4responder
  storageClass: manual
l4responder:
  enabled: true
# Default per-node capture configurations (empty - populated by Ansible)
captureNodes: {}

# Image configurations
l4responder_server:
  repository: registry.local:30500/public/l4responder_server 
  tag: latest
  pullPolicy: Always


l4responder_toolbox:
  repository: registry.local:30500/public/l4responder_toolbox 
  tag: latest
  pullPolicy: Always
  config:
    portRanges:
      - start: 10000
        end: 20000
      - start: 30000
        end: 40000

  # Network configuration
  network:
    # Use host network for packet capture
    hostNetwork: true
    # DNS policy when using host network
    dnsPolicy: ClusterFirstWithHostNet



# Network policy 
networkPolicy:
  enabled: false
  allowedCidrs:
    - "10.0.0.0/24"
