# applications/l4responder/helm/values.yaml
global:
  namespace: l4responder
  storageClass: manual

# Default per-node capture configurations (empty - populated by Ansible)
captureNodes: {}

# Image configurations
L4Images:
  enabled: true
  image:
    repository: registry.local:30500/public/l4responder
    tag: latest
    pullPolicy: IfNotPresent  


# Network configuration
network:
  # Use host network for packet capture
  hostNetwork: true
  # DNS policy when using host network
  dnsPolicy: ClusterFirstWithHostNet

# Security context (container-level)
securityContext:
  # Required for packet capture
  privileged: true
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

# Network policy 
networkPolicy:
  enabled: false
  allowedCidrs:
    - "10.0.0.0/24"
    - "10.10.0.0/24"

# Resource limits (shared)
resources:
  capture:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  arp:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"