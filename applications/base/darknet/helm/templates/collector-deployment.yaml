{{- if .Values.collector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "darknet.fullname" . }}-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "darknet.collector.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "darknet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        {{- include "darknet.collector.labels" . | nindent 8 }}
    spec:
      {{- with .Values.collector.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
      - name: collector
        image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
        imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
        
        command: ["/app/collector.sh"]
        
        env:
        - name: WORKER_NODES
          value: {{ .Values.collector.config.workerNodes | join " " | quote }}
        - name: SSH_USERS
          value: {{ .Values.collector.config.sshUsers | join " " | quote }}
        - name: SOURCE_PATH
          value: {{ .Values.collector.config.srcPath | quote }}
        - name: DEST_PATH
          value: {{ .Values.collector.config.dstPath | quote }}
        - name: COLLECTION_INTERVAL
          value: {{ .Values.collector.config.collectionInterval | quote }}
        - name: SSH_OPTS
          value: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
        
        volumeMounts:
        - name: collector-data
          mountPath: {{ .Values.collector.config.dstPath }}
        - name: ssh-key
          mountPath: /etc/ssh-keys
          readOnly: true
        - name: collector-script
          mountPath: /app
          readOnly: true
        
        resources:
          {{- toYaml .Values.collector.resources | nindent 10 }}
        
        # Health check - look for the collector process
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep -f collector.sh
          initialDelaySeconds: 60
          periodSeconds: 60
        
        readinessProbe:
          exec:
            command:
            - /bin/sh  
            - -c
            - test -d {{ .Values.collector.config.dstPath }}
          initialDelaySeconds: 10
          periodSeconds: 30
      
      volumes:
      - name: collector-data
        persistentVolumeClaim:
          claimName: {{ include "darknet.fullname" . }}-collector-pvc
      - name: ssh-key
        secret:
          secretName: {{ .Values.collector.sshKeySecret }}
          defaultMode: 0600
      
      restartPolicy: Always
{{- end }}