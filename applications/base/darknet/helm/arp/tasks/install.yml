# roles/arp/tasks/install.yml
- name: Debug variables for application
  debug:
    msg:
      - "Application: {{ application }}"
      - "Group vars loaded: {{ application_vars | default({}) | length > 0 }}"
      - "host_specific defined: {{ application_vars.host_specific is defined }}"

- name: Deploy Helm chart for each node in the application group
  command: >
    {% set host_specific = application_vars.host_specific | default({}) %}
    {% set namespace = application_vars.arp_namespace | default(application) %}
    {% set host_config = host_specific[item] | default({}) %}
    {% set arp4_interface = host_config.arp4_interface | default('eth0') %}
    {% set arp4_network = host_config.arp4_network | default('10.10.0.0/24') %}
    {% set arp6_interface = host_config.arp6_interface | default('eth0') %}
    helm upgrade -i {{ application }}-{{ item }} {{ playbook_dir }}/../resources/helm-charts/{{ application }} 
    --namespace {{ namespace }} 
    --create-namespace
    --set name={{ application }}-{{ item }}
    --set appName={{ application }}-{{ item }}
    --set namespace={{ namespace }}
    --set "containers.arp4.image={{ local_registry }}/public/ipv4:{{ image_tag }}"
    --set "containers.arp6.image={{ local_registry }}/public/ipv6:{{ image_tag }}"
    --set "containers.arp4.args={"{{ arp4_interface }}","{{ arp4_network }}"}"
    --set "containers.arp6.args={"{{ arp6_interface }}"}"
    --set nodeAffinity.hostname.values[0]={{ item }}
  register: helm_result
  with_items: "{{ groups[application] }}"