# templates/pv.yaml
{{- if .Values.cowrie.persistence.enabled }}
{{- if eq .Values.cowrie.persistence.type "hostPath" }}
{{- range $nodeName, $nodeConfig := .Values.deployments }}
{{- if $nodeConfig.enabled }}
{{- range $ipIndex, $exposedIP := $nodeConfig.exposedIPs }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "cowrie.fullname" $ }}-{{ $nodeName }}-{{ $ipIndex }}-pv
  labels:
    {{- include "cowrie.labels" $ | nindent 4 }}
    cowrie.io/node: {{ $nodeName }}
    cowrie.io/ip: {{ $exposedIP | replace "." "-" | replace "/" "-" }}
spec:
  capacity:
    storage: {{ $.Values.cowrie.persistence.size }}
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: {{ $nodeConfig.storage.hostPath }}/{{ $exposedIP | replace "." "-" | replace "/" "-" }}
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - {{ $nodeConfig.nodeSelector }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
