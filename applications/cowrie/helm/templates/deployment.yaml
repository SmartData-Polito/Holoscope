# templates/deployment.yaml
{{- range $nodeName, $nodeConfig := .Values.deployments }}
{{- if $nodeConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cowrie.fullname" $ }}-{{ $nodeName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "cowrie.labels" $ | nindent 4 }}
    cowrie.io/node: {{ $nodeName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cowrie.selectorLabels" $ | nindent 6 }}
      cowrie.io/node: {{ $nodeName }}
  template:
    metadata:
      labels:
        {{- include "cowrie.selectorLabels" $ | nindent 8 }}
        cowrie.io/node: {{ $nodeName }}
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ $nodeConfig.nodeSelector }}
      
      # Initialize required directories
      initContainers:
      - name: setup-cowrie-dirs
        image: busybox
        command: ['sh', '-c']
        args:
          - |
            mkdir -p /cowrie/cowrie-git/var/log/cowrie
            mkdir -p /cowrie/cowrie-git/var/lib/cowrie
            mkdir -p /cowrie/cowrie-git/var/lib/cowrie/tty
            mkdir -p /cowrie/cowrie-git/var/lib/cowrie/downloads
            chown -R 999:999 /cowrie/cowrie-git/var
            chmod -R 755 /cowrie/cowrie-git/var
        {{- if $.Values.cowrie.persistence.enabled }}
        volumeMounts:
        - name: cowrie-data
          mountPath: /cowrie/cowrie-git/var
        {{- end }}
      
      containers:
      - name: {{ $.Values.cowrie.container.name }}
        image: "{{ $.Values.cowrie.image.repository }}:{{ $.Values.cowrie.image.tag }}"
        imagePullPolicy: {{ $.Values.cowrie.image.pullPolicy }}
        
        ports:
        - containerPort: {{ $.Values.cowrie.container.port }}
          name: ssh
        
        env:
        - name: COWRIE_HOSTNAME
          value: "{{ $nodeName }}-honeypot"
        - name: COWRIE_LISTEN_ENDPOINTS
          value: "tcp:port={{ $.Values.cowrie.container.port }}:interface=0.0.0.0"
        
        resources:
          {{- toYaml $.Values.cowrie.resources | nindent 10 }}
        
        {{- if $.Values.cowrie.persistence.enabled }}
        volumeMounts:
        - name: cowrie-data
          mountPath: /cowrie/cowrie-git/var
        {{- end }}
      
      {{- if $.Values.cowrie.persistence.enabled }}
      volumes:
      - name: cowrie-data
        persistentVolumeClaim:
          claimName: {{ include "cowrie.fullname" $ }}-{{ $nodeName }}-pvc
      {{- end }}
{{- end }}
{{- end }}