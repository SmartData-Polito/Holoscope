# templates/service.yaml
{{- range $nodeName, $nodeConfig := .Values.deployments }}
{{- if $nodeConfig.enabled }}
{{- range $ipIndex, $exposedIP := $nodeConfig.exposedIPs }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cowrie.fullname" $ }}-{{ $nodeName }}-{{ $ipIndex }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "cowrie.labels" $ | nindent 4 }}
    cowrie.io/node: {{ $nodeName }}
    cowrie.io/ip: {{ $exposedIP | replace "." "-" | replace "/" "-" }}
spec:
  type: ClusterIP
  externalIPs:
    - {{ $exposedIP }}
  ports:
    - port: 22
      targetPort: {{ $.Values.cowrie.container.port }}
      protocol: TCP
      name: ssh
  selector:
    {{- include "cowrie.selectorLabels" $ | nindent 4 }}
    cowrie.io/node: {{ $nodeName }}
{{- end }}
{{- end }}
{{- end }}