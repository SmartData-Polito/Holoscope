global:
  namespace: cowrie

cowrie:
  image:
    repository: cowrie/cowrie
    tag: "latest"
    pullPolicy: IfNotPresent
  
  # Container configuration
  container:
    name: cowrie
    port: 2222  # Cowrie runs on port 2222 internally
  
  # Service configuration
  service:
    type: NodePort
    port: 22    # External SSH port
    targetPort: 2222
  
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # Storage for logs
  persistence:
    enabled: true
    storageClass: "manual"
    accessMode: ReadWriteOnce
    size: 5Gi

