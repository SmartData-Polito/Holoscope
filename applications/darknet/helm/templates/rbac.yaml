apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "darknet.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "darknet.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "darknet.fullname" . }}
  labels:
    {{- include "darknet.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "darknet.fullname" . }}
  labels:
    {{- include "darknet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "darknet.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "darknet.fullname" . }}
  namespace: {{ .Values.global.namespace }}