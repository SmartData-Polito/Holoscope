{{- if .Values.collector.enabled }}
# SSH key pair generation job
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "darknet.fullname" . }}-ssh-keygen
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "darknet.collector.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "darknet.fullname" . }}-ssh-keygen
      containers:
      - name: ssh-keygen
        image: "registry.local:30500/public/ssh-keygen:latest"
        imagePullPolicy: Always
        
        env:
        - name: K8S_MODE
          value: "true"
        - name: SECRET_NAME
          value: {{ .Values.collector.sshKeySecret | quote }}
        - name: KEY_COMMENT
          value: "darknet-collector-{{ .Release.Name }}"
---
# Service account for SSH key generation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "darknet.fullname" . }}-ssh-keygen
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
---
# Role for SSH key generation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "darknet.fullname" . }}-ssh-keygen
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "patch", "update"]
---
# Role binding for SSH key generation
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "darknet.fullname" . }}-ssh-keygen
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
subjects:
- kind: ServiceAccount
  name: {{ include "darknet.fullname" . }}-ssh-keygen
  namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: {{ include "darknet.fullname" . }}-ssh-keygen
  apiGroup: rbac.authorization.k8s.io
{{- end }}