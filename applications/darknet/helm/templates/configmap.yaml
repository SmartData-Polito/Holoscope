{{- if .Values.collector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "darknet.fullname" . }}-collector-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "darknet.collector.labels" . | nindent 4 }}
data:
  # Environment variables for the collector
  WORKER_NODES: {{ .Values.collector.config.workerNodes | join " " | quote }}
  SSH_USERS: {{ .Values.collector.config.sshUsers | join " " | quote }}
  SOURCE_PATH: {{ .Values.collector.config.srcPath | quote }}
  DEST_PATH: {{ .Values.collector.config.dstPath | quote }}
  COLLECTION_INTERVAL: {{ .Values.collector.config.collectionInterval | quote }}
  LOG_LEVEL: "INFO"
{{- end }}