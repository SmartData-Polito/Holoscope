# applications/darknet/helm/values.yaml
global:
  namespace: darknet

# Image tag — overridden at deploy time with git SHA
image_tag: latest

# Default per-node capture configurations (empty - populated by Ansible)
captureNodes: {}

# Network configuration
network:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

# Security context for ARP daemon
securityContext:
  privileged: false
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW

# Resource limits
resources:
  arp:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Image configurations
arpImages:
  ipv4:
    repository: registry.local:5000/public/ipv4
    pullPolicy: IfNotPresent
