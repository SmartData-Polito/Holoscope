all:
  hosts:
    polito-1:
      ansible_host: 10.10.10.100
      # ansible_ssh_private_key: privatekey
      ansible_user: vagrant
      # WireGuard server variables
      wireguard_ip: "10.0.0.100"
      wireguard_interface: "eth1"
      wireguard_private_key: !vault |
        $ANSIBLE_VAULT;1.1;AES256
        66633530373637636637333065363864616339313262623361393132326564386661393935323865
        3964663130373962333333653931376334356338313231310a366562343233636166376634376631
        31353534396666336230326464333064343337383463343035383333326162373666383363313538
        3261353731313330310a356261626630306263653537656238333536313134323465353163316633
        32343632383539356530366531646562353335313739663436366666663965343663663163396132
        6631326264396663313935373037383230333833636665323464
      wireguard_public_key: /SPUC+mZEcY0ChebN97MhEExlWh/LJR0NbLs8eg27Uk=
      wireguard_listen_port: "51820"
      wireguard_endpoint: "10.10.10.100:51820"

    brescia1:
      ansible_host: 10.10.10.101
      ansible_user: vagrant
      # ansible_ssh_private_key: privatekey
      wireguard_ip: "10.0.0.101"
      wireguard_interface: "eth1"

  children:
    deployment:
      hosts:
        localhost:
          ansible_connection: local
    master:
      hosts:
        polito-1:
    agents:
      hosts:
        brescia1:

    darknet:
      hosts:
        polito-1:
          hostPath: "/mnt/data/tcpdump"
          monthPath: "/etc/tcpdump"
          tcpdump_interface: "eth1"
          tcpdump_filter: "ip and (net 130.192.167.0/24)"
          tcpdump_rotate_seconds: "3600"
          tcpdump_file_pattern: "trace-%Y%m%d_%H-%M-%S_%s.pcap" 

    flower:
      hosts:
        polito-1:
        brescia1:

    cowrie:
      hosts:
        polito-1:

    arp_responder:
      hosts:
        brescia1:
          arp4_interface: "eth1"
          arp4_network: "20.0.0.0/24"
          arp6_interface: "eth1"
        polito-1:
          arp4_interface: "eth1"
          arp4_network: "20.0.0.0/24"
          arp6_interface: "eth1"

  vars:
    # K3s variables
    k3s_version: "v1.29.6+k3s2"
    k3s_url: "https://10.0.0.100:6443"
    applications_namespace: "ansible-managed"
