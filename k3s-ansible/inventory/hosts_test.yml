all:
  hosts:
    poli-master-00:
      ansible_host: 10.10.0.100
      ansible_ssh_private_key_file: "../vm-provisioning/.vagrant/machines/poli-master-00/libvirt/private_key"
      ansible_user: vagrant
      # WireGuard server variables
      wireguard_ip: "10.0.0.100"
      public_interface: "eth0"
      wireguard_interface: "wg0"
      wireguard_private_key: !vault |
        $ANSIBLE_VAULT;1.1;AES256
        66633530373637636637333065363864616339313262623361393132326564386661393935323865
        3964663130373962333333653931376334356338313231310a366562343233636166376634376631
        31353534396666336230326464333064343337383463343035383333326162373666383363313538
        3261353731313330310a356261626630306263653537656238333536313134323465353163316633
        32343632383539356530366531646562353335313739663436366666663965343663663163396132
        6631326264396663313935373037383230333833636665323464
      wireguard_public_key: /SPUC+mZEcY0ChebN97MhEExlWh/LJR0NbLs8eg27Uk=
      wireguard_listen_port: "51820"
      wireguard_endpoint: "10.10.0.100:51820"

    poli-worker-00:
      ansible_host: 10.10.0.101
      ansible_user: vagrant
      ansible_ssh_private_key_file: "../vm-provisioning/.vagrant/machines/poli-worker-00/libvirt/private_key"
      wireguard_ip: "10.0.0.101"
      public_interface: "eth0"
      wireguard_interface: "wg0"

    garr-worker-00:
      ansible_host: 10.10.0.102
      ansible_user: vagrant
      ansible_ssh_private_key_file: "../vm-provisioning/.vagrant/machines/garr-worker-00/libvirt/private_key"
      wireguard_ip: "10.0.0.102"
      public_interface: "eth0"
      wireguard_interface: "wg0"

  children:
    deployment:
      hosts:
        localhost:
          ansible_connection: local
    registry:
      hosts:
        poli-master-00:
    master:
      hosts:
        poli-master-00:
    agents:
      hosts:
        poli-worker-00:
        garr-worker-00:
    vpn:
      hosts:
        poli-worker-00:
        garr-worker-00:
        
    darknet:
      hosts:
        poli-worker-00:
          darknet_range: "10.10.0.0/24"
          darknet_exclude_ips: 
            - 10.10.0.100
            - 10.10.0.101
            - 10.10.0.102
          darknet_hostPath: "/data/darknet"
          darknet_mountPath: "/data/darknet"
          tcpdump_interface: "eth0"
          tcpdump_rotate_seconds: "3600"
          tcpdump_file_pattern: "trace-%Y%m%d_%H-%M-%S_%s.pcap" 
        garr-worker-00:
          darknet_range: "10.10.0.0/24"
          darknet_exclude_ips: 
            - 10.10.0.100
            - 10.10.0.101
            - 10.10.0.102
          darknet_hostPath: "/data/darknet"
          darknet_mountPath: "/data/darknet"
          tcpdump_interface: "eth0"
          tcpdump_rotate_seconds: "3600"
          tcpdump_file_pattern: "trace-%Y%m%d_%H-%M-%S_%s.pcap" 
      vars: 
        darknet_namespace: "darknet"

    arp_responder:
      hosts:
        poli-worker-00:
          arp4_interface: "eth0"
          arp4_network: "10.10.0.0/25"
          arp6_interface: "eth0"  
        garr-worker-00:
          arp4_interface: "eth0"
          arp4_network: "10.10.0.128/25"
          arp6_interface: "eth0"  
      vars: 
        arp_responder_namespace: "arp-responder"
  vars:
    # K3s variables
    helm_version: "v3.7.0"
    k3s_version: "v1.30.4+k3s1"
    k3s_url: "https://10.0.0.100:6443"
    deployed_applications: 
      - darknet
      - arp_responder