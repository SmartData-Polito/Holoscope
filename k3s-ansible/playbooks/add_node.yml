---
- name: Post-installation steps
  hosts: master1
  become: yes
  roles:
    - role: k3s-server
      tasks_from: post_install

# ansible-playbook -i inventory/hosts.yml --ask-vault-password playbooks/add_node.yml -e "agents_group=brescia"
- name: Configure agents
  hosts: "{{ agents_group }}"
  become: yes
  roles:
    - common
    - wireguard-client
    - k3s-agent

- name: Post-installation steps on WireGuard server
  hosts: master1
  become: yes
  roles:
    - role: wireguard-server
      tasks_from: post_install