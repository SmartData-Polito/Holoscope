{{- range .Values.pvc }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .name }}-{{$.Values.appName}}
  namespace: {{ $.Values.namespace }}
spec:
  storageClassName: {{ .storageClassName }}
  accessModes:
    {{- range .accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: 5Gi
  volumeName: {{ .volumeName }}-{{$.Values.appName}}
---
{{- end }}
