apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.appName }}
    app.kubernetes.io/instance: {{ .Values.appName }}
    app.kubernetes.io/part-of: {{ .Values.appName }}
spec: 
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}
    spec:
      containers:
      - name: registry
        image: {{ .Values.containers.registry.image }}
        ports:
        - containerPort: 5000
        volumeMounts:
          - mountPath: {{ .Values.containers.registry.monthPath }}
            name: {{ .Values.volumes.pv.name }}
      volumes:
        - name: {{ .Values.volumes.pv.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.volumes.pvc.name }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: 
                    {{- range .Values.nodeAffinity.hostname.values }}
                    - {{ . }}
                    {{- end }}