apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.daemonsetName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.appName }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      containers:
        - name: arp4-responder
          image: {{ .Values.containers.arp4.image }}
          imagePullPolicy: {{ .Values.containers.arp4.imagePullPolicy }}
          command: {{ .Values.containers.arp4.command | toJson}}
        - name: arp6-responder
          image: {{ .Values.containers.arp6.image }}
          imagePullPolicy: {{ .Values.containers.arp6.imagePullPolicy }}
          command: {{ .Values.containers.arp6.command | toJson }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: {{ .Values.nodeAffinity.hostname.values | toYaml | nindent 22 }}
