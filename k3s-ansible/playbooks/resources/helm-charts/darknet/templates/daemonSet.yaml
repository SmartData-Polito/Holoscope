apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: darknet
  # namespace: hpot
  labels:
    app.kubernetes.io/name: darknet
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: darknet
  template:
    metadata:
      labels:
        app.kubernetes.io/name: darknet
    spec:
      host_network: true
      containers:
       # - name: container-darknet
        #  image: alpine:latest   

        - name: container-netshoot
          securityContext:
            privileged: true   
          image: nicolaka/netshoot      
          command: ["/bin/bash"]
          args: ["-c", "tcpdump -i any -G {{ .Values.tcp_dump_parameters.G }} -w {{ .Values.features.darknet.folder_container }}/trace_darknet_%Y%m%d_%H:%M:%S.pcap"]
          volumeMounts:
            - mountPath: {{ .Values.features.darknet.folder_container }}
              name: pv-storage-1
      volumes:
        - name: pv-storage-1
          persistentVolumeClaim:
            claimName: pvc-tcpdump-darknet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range $v := .Values.features.darknet.hosts }}
                      - {{ $v }}
                      {{- end }}

