deploymentName: flower-server
appName: flower-server
namespace: default

containers:
  server:
    image: andreasordello/flower_idarkvec_server:latest
    imagePullPolicy: Always
    
    args:
      client_number: 1
      first_day: 20210501
      end_day: 20210503
      server_port: 8080
      max_voc_size: -1
      beta: 0.8

           
    port: 8080
    volumeMounts:
    - mountPath: /idarkvec/models
      name: volume-1
    - mountPath: /idarkvec/vocabularies
      name: volume-2
    - mountPath: /idarkvec/log/
      name: volume-3
    - mountPath: /idarkvec/interest/
      name: volume-4


nodeAffinity:
  hostname:
    values:
      - poli-worker-00  #for now



volumes:
    - name : volume-1
      claimName: pv-claim-models
    - name : volume-2
      claimName: pv-claim-vocabularies   
    - name : volume-3
      claimName: pv-claim-log-server
    - name : volume-4
      claimName: pv-claim-interest  

   
pv:

    models:
        name: pv-volume-models
        storageClassName: manual
        capacity: 15Gi
        accessModes:
          - ReadWriteOnce
        hostPath:
          path: "/data/models"

    vocabularies:
        name: pv-volume-vocabularies
        storageClassName: manual
        capacity: 5Gi
        accessModes:
          - ReadWriteOnce
        hostPath:
          path: "/data/vocabularies"

    log:
        name: pv-volume-log-server
        storageClassName: manual
        capacity: 5Gi
        accessModes:
          - ReadWriteOnce
        hostPath:
          path: "/data/log"
    interest:
        name: pv-volume-interest
        storageClassName: manual
        capacity: 5Gi
        accessModes:
          - ReadWriteOnce
        hostPath:
          path: "/data/interest"

pvc:
      - name: pv-claim-log-server
        storageClassName: manual
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        volumeName: pv-volume-log-server
      - name: pv-claim-vocabularies
        storageClassName: manual
        accessModes:
        - ReadWriteOnce
        resources:
        requests:
          storage: 5Gi
        volumeName: pv-volume-vocabularies
      - name: pv-claim-models
        storageClassName: manual
        accessModes:
        - ReadWriteOnce
        resources:
        requests:
          storage: 15Gi
        volumeName: pv-volume-models
      - name: pv-claim-interest
        storageClassName: manual
        accessModes:
        - ReadWriteOnce
        resources:
        requests:
          storage: 5Gi
        volumeName: pv-volume-interest
        
# Service Configuration
service:
  name: flower-server
  port: 8080
  targetPort: 8080