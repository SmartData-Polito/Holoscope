---

- name: Create rsync script for each host in darknet group
  template:
    src: rsync_script.sh.j2
    dest: /home/{{ ansible_user }}/rsync_script-{{ item }}.sh
    mode: '0755'  # Make the script executable
  with_items: "{{ groups['darknet'] }}"  # Iterate over the darknet group

- name: Create cron job to run the rsync script for each host in darknet group
  cron:
    name: "Run rsync script for {{ item }}"
    minute: "*/1"  # Set the cron to run every 5 minutes
    # minute: "0"  # Set the minute field for the cron schedule
    # hour: "0"    # Set the hour field for the cron schedule
    job: "/home/{{ ansible_user }}/rsync_script-{{ item }}.sh"
    state: present
  with_items: "{{ groups['darknet'] }}"  # Iterate over the darknet group
