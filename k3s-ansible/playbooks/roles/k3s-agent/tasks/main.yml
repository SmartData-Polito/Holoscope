---
- name: Install and configure K3s
  shell: |
    curl -sfL https://get.k3s.io | sh -s - agent  --flannel-iface=wg0 --node-ip={{hostvars[ inventory_hostname ].wireguard_ip}}  --token="{{hostvars[groups['master'][0]].k3s_token}}" --server="https://{{hostvars[groups['master'][0]].wireguard_ip}}:6443" --node-name="{{inventory_hostname}}" --debug --docker
